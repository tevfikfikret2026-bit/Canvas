<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minimalist Saat ve Rastgele Sözler</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/flipclock/0.7.8/flipclock.css">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/flipclock/0.7.8/flipclock.min.js"></script>
    
    <style>
        body {
            background-color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden;
            position: relative;
        }
        #quote-container {
            text-align: center;
            margin-bottom: 60px;
            max-width: 700px;
            padding: 0 20px;
        }
        .quote-text {
            font-size: 28px;
            font-weight: 400;
            line-height: 1.4;
            color: #000000;
        }
        .quote-author {
            font-size: 15px;
            font-weight: 600;
            color: #666666;
            margin-top: 15px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        
        /* Şık Siyah FlipClock Tasarımı */
        .clock {
            width: auto;
            display: inline-block;
            transform: scale(1.1);
        }
        .flip-clock-wrapper ul {
            background: #111111 !important;
            border-radius: 8px !important;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.15) !important;
        }
        .flip-clock-wrapper ul li a div div.inn {
            color: #ffffff !important;
            background-color: #111111 !important;
            border-radius: 8px !important;
            font-weight: 500 !important;
        }
        .flip-clock-wrapper ul li a div.down {
            border-bottom-left-radius: 8px !important;
            border-bottom-right-radius: 8px !important;
        }
        .flip-clock-wrapper ul li a div.up:after {
            background-color: rgba(255, 255, 255, 0.1) !important;
            height: 1px !important;
        }
        .flip-clock-divider .flip-clock-label {
            display: none; 
        }
        .flip-clock-dot {
            background: #111111 !important;
            width: 8px !important;
            height: 8px !important;
            left: 11px !important;
            box-shadow: none !important;
        }

        /* SOL TARAFTA HER ZAMAN GÖRÜNEN BELİRGİN TAM EKRAN BUTONU */
        #fullscreen-btn {
            position: fixed;
            left: 0;
            top: 0;
            bottom: 0;
            width: 50px; /* Sol tarafta ince dikey bir şerit */
            background-color: #111111;
            color: #ffffff;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            transition: background-color 0.3s ease, width 0.3s ease;
        }
        
        /* Butonun içindeki yazıyı dikey döndürmek için */
        #fullscreen-btn span {
            writing-mode: vertical-rl;
            transform: rotate(180deg);
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 11px;
            font-weight: bold;
            white-space: nowrap;
        }

        #fullscreen-btn:hover {
            background-color: #333333;
            width: 60px; /* Üzerine gelince hafifçe genişler */
        }
    </style>
</head>
<body>

    <button id="fullscreen-btn" title="Tam Ekran Modunu Aç/Kapat">
        <span>TAM EKRAN</span>
    </button>

    <div id="quote-container">
        <div id="text" class="quote-text">Yükleniyor...</div>
        <div id="author" class="quote-author"></div>
    </div>

    <div class="clock"></div>

    <script src="quotes.js"></script>

    <script>
        function akilliSozSec() {
            if (typeof quotes === 'undefined' || quotes.length === 0) {
                document.getElementById('text').innerText = "Hata: quotes.js dosyası veya içeriği yüklenemedi!";
                return;
            }

            let gosterilenIndexler = JSON.parse(localStorage.getItem('gosterilenIndexler')) || [];
            let kalanIndexler = [];
            for (let i = 0; i < quotes.length; i++) {
                if (!gosterilenIndexler.includes(i)) {
                    kalanIndexler.push(i);
                }
            }

            if (kalanIndexler.length === 0) {
                gosterilenIndexler = [];
                for (let i = 0; i < quotes.length; i++) {
                    kalanIndexler.push(i);
                }
            }

            const rastgeleSecilenIndex = kalanIndexler[Math.floor(Math.random() * kalanIndexler.length)];
            const secilenSoz = quotes[rastgeleSecilenIndex];

            gosterilenIndexler.push(rastgeleSecilenIndex);
            localStorage.setItem('gosterilenIndexler', JSON.stringify(gosterilenIndexler));

            document.getElementById('text').innerText = `“${secilenSoz.text}”`;
            document.getElementById('author').innerText = secilenSoz.author;
        }

        // Güvenli Tam Ekran Değiştirici
        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(err => {
                    alert(`Tam ekran modu açılırken bir tarayıcı engeli oluştu: ${err.message}`);
                });
            } else {
                document.exitFullscreen();
            }
        }

        $(document).ready(function() {
            $('.clock').FlipClock({
                clockFace: 'TwentyFourHourClock'
            });
            
            akilliSozSec();

            // Butona tıklandığında tam ekrana geçirir
            $('#fullscreen-btn').on('click', function() {
                toggleFullscreen();
            });
        });
    </script>

</body>
</html>

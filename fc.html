<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minimalist Saat & Sözler</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/flipclock/0.7.8/flipclock.css">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/flipclock/0.7.8/flipclock.min.js"></script>
    
    <style>
        /* Genel Düzen */
        body {
            background-color: #ffffff;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }

        /* SOL KENAR BUTONLARI (Boyutları Sabit Tutuldu) */
        #sidebar {
            position: fixed;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            flex-direction: column;
            gap: 15px;
            z-index: 9999;
        }

        .action-btn {
            width: 40px;
            height: 40px;
            background-color: #000000;
            color: #ffffff;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .action-btn:hover {
            transform: scale(1.1);
            background-color: #333333;
        }

        .action-btn svg {
            width: 18px;
            height: 18px;
            fill: white;
        }

        /* SÖZ ALANI (Büyütüldü) */
        #quote-display {
            text-align: center;
            margin-bottom: 60px;
            max-width: 1000px;
            padding: 0 40px;
            min-height: 180px;
        }

        #text {
            font-size: 42px; /* Font Büyütüldü */
            font-weight: 300;
            color: #000000;
            line-height: 1.3;
        }

        #author {
            font-size: 20px; /* Font Büyütüldü */
            font-weight: 700;
            color: #aaaaaa;
            margin-top: 25px;
            text-transform: uppercase;
            letter-spacing: 4px;
        }

        /* SAAT (Büyütüldü) */
        .clock {
            width: auto;
            display: inline-block;
            transform: scale(1.8); /* Ölçek 0.9'dan 1.8'e çıkarıldı */
            margin-top: 40px;
        }

        /* MODAL (LİSTE EKRANI - Büyütüldü) */
        #list-modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #ffffff;
            z-index: 10000;
            overflow-y: auto;
            padding: 60px;
            box-sizing: border-box;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 3px solid #000;
            padding-bottom: 20px;
            margin-bottom: 30px;
        }

        .modal-header h1 {
            font-size: 36px;
            margin: 0;
        }

        .close-btn {
            padding: 15px 30px;
            background: #000;
            color: #fff;
            border: none;
            cursor: pointer;
            font-weight: bold;
            font-size: 18px;
        }

        .list-item {
            padding: 25px 0;
            border-bottom: 1px solid #eee;
            font-size: 20px; /* Liste metni büyütüldü */
            line-height: 1.5;
        }

        /* FlipClock Siyah Tema Ayarları */
        .flip-clock-wrapper ul li a div div.inn { background-color: #000 !important; color: #fff !important; }
        .flip-clock-dot { background: #000 !important; }
        .flip-clock-divider .flip-clock-label { display: none; }
    </style>
</head>
<body>

    <div id="sidebar">
        <button class="action-btn" id="btn-fullscreen" title="Tam Ekran">
            <svg viewBox="0 0 24 24"><path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z"/></svg>
        </button>
        <button class="action-btn" id="btn-list" title="Tüm Sözler">
            <svg viewBox="0 0 24 24"><path d="M3 13h2v-2H3v2zm0 4h2v-2H3v2zm0-8h2V7H3v2zm4 4h14v-2H7v2zm0 4h14v-2H7v2zM7 7v2h14V7H7z"/></svg>
        </button>
        <button class="action-btn" id="btn-next" title="Sıradaki Söz">
            <svg viewBox="0 0 24 24"><path d="M12 4V1L8 5l4 4V6c3.31 0 6 2.69 6 6 0 1.01-.25 1.97-.7 2.8l1.46 1.46C19.54 15.03 20 13.57 20 12c0-4.42-3.58-8-8-8zm0 14c-3.31 0-6-2.69-6-6 0-1.01.25-1.97.7-2.8L5.24 7.74C4.46 8.97 4 10.43 4 12c0 4.42 3.58 8 8 8v3l4-4-4-4v3z"/></svg>
        </button>
    </div>

    <div id="quote-display">
        <div id="text">...</div>
        <div id="author"></div>
    </div>

    <div class="clock"></div>

    <div id="list-modal">
        <div class="modal-header">
            <h1>TÜM SÖZLER</h1>
            <button class="close-btn" onclick="$('#list-modal').fadeOut()">KAPAT</button>
        </div>
        <div id="full-list"></div>
    </div>

    <!-- quotes.js dosyasının varlığından emin olun veya aşağıya bir script tagı ile quotes dizisini ekleyin -->
    <script src="quotes.js"></script> 
    <script>
        $(document).ready(function() {
            // Saat Kurulumu
            var clock = $('.clock').FlipClock({
                clockFace: 'TwentyFourHourClock'
            });

            // Söz Getirme Fonksiyonu
            function sozGetir() {
                if (typeof quotes === 'undefined' || quotes.length === 0) {
                    $('#text').text("quotes.js bulunamadı veya içi boş.");
                    return;
                }

                let gosterilenler = JSON.parse(localStorage.getItem('gosterilenler')) || [];
                let kalanlar = quotes.map((_, i) => i).filter(i => !gosterilenler.includes(i));

                if (kalanlar.length === 0) {
                    gosterilenler = [];
                    kalanlar = quotes.map((_, i) => i);
                }

                let randomIdx = Math.floor(Math.random() * kalanlar.length);
                let secilenIndex = kalanlar[randomIdx];
                let secilen = quotes[secilenIndex];

                let metin = secilen.text || secilen.quote || "Metin yok.";
                let yazar = secilen.author || "Bilinmiyor";

                $('#text').fadeOut(200, function() {
                    $(this).text("“" + metin + "”").fadeIn(200);
                });
                $('#author').fadeOut(200, function() {
                    $(this).text(yazar).fadeIn(200);
                });

                gosterilenler.push(secilenIndex);
                localStorage.setItem('gosterilenler', JSON.stringify(gosterilenler));
            }

            // Liste Hazırlama
            function listeyiHazirla() {
                if (typeof quotes === 'undefined') return;
                let html = "";
                quotes.forEach((s, i) => {
                    let m = s.text || s.quote || "Metin yok";
                    let y = s.author || "Bilinmiyor";
                    html += `<div class="list-item"><strong>${i+1}.</strong> ${m} <br> <small>— ${y}</small></div>`;
                });
                $('#full-list').html(html);
            }

            // Buton Dinleyicileri
            $('#btn-next').click(sozGetir);
            
            $('#btn-list').click(function() {
                listeyiHazirla();
                $('#list-modal').fadeIn();
            });

            $('#btn-fullscreen').click(function() {
                if (!document.fullscreenElement) {
                    document.documentElement.requestFullscreen();
                } else {
                    if (document.exitFullscreen) {
                        document.exitFullscreen();
                    }
                }
            });

            // İlk açılışta söz getir
            sozGetir();
        });
    </script>
</body>
</html>
